<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 AI</title>
</head>
<body>
    <h1>Connect 4 AI Engine</h1>
    <p>Check the Browser Console (F12) to see the AI load and calculate.</p>

    <script>
        // 1. The Model Data
        let model = { weights: null };

        // 2. Load the model
        async function loadModel() {
            try {
                const response = await fetch('2000.json');
                model.weights = await response.json();
                console.log("Model loaded successfully.");
            } catch (e) {
                console.error("Error loading 2000.json. Make sure you are running a local server!", e);
            }
        }

        // 3. The Logic
        function forwardPass(input) {
            const { W1, b1 } = model.weights;
            let output = new Float32Array(W1.length);
            for (let i = 0; i < W1.length; i++) {
                let sum = b1[i];
                for (let j = 0; j < input.length; j++) {
                    sum += input[j] * W1[i][j];
                }
                output[i] = Math.tanh(sum);
            }
            return output;
        }

        async function runAI(boardState) {
            if (!model.weights) await loadModel();
            const probabilities = forwardPass(new Float32Array(boardState));
            return probabilities.indexOf(Math.max(...probabilities));
        }

        // 4. Initialization: Run this when the page loads
        window.onload = async () => {
            await loadModel();
            
            // Test input (42 zeros for an empty 6x7 board)
            const testBoard = new Array(42).fill(0);
            const move = await runAI(testBoard);
            console.log("AI decided to play in column:", move);
        };
    </script>
</body>
</html>
