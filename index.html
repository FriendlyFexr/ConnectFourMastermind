<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 AI</title>
</head>
<body>
    <h1>Connect 4 AI Engine</h1>
    <p>Check the Browser Console (F12) to see the AI load and calculate.</p>

    <script>
        let model = { weights: null };
    
        async function loadModel() {
            try {
                const response = await fetch('2000.json');
                const data = await response.json();
                model.weights = data; 
                console.log("Model structure loaded:", Object.keys(data));
            } catch (e) {
                console.error("Failed to load 2000.json", e);
            }
        }
    
        function forwardPass(input) {
            // SAFETY CHECK: Ensure weights exist
            if (!model.weights || !model.weights.W1) {
                console.error("Weights not found! Ensure 2000.json has 'W1' and 'b1' keys.");
                return null;
            }
    
            const { W1, b1 } = model.weights;
            let output = new Float32Array(W1.length);
            
            for (let i = 0; i < W1.length; i++) {
                let sum = b1[i];
                for (let j = 0; j < input.length; j++) {
                    sum += input[j] * W1[i][j];
                }
                output[i] = Math.tanh(sum);
            }
            return output;
        }
    
        async function runAI(boardState) {
            // Wait until loadModel finishes before proceeding
            if (!model.weights) await loadModel();
            
            const result = forwardPass(new Float32Array(boardState));
            if (result) {
                return result.indexOf(Math.max(...result));
            }
        }
    
        window.onload = async () => {
            await loadModel();
            const testBoard = new Array(42).fill(0);
            const move = await runAI(testBoard);
            console.log("AI Move:", move);
        };
    </script>
</body>
</html>
