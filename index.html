<!DOCTYPE html>
<html>
<head>
    <title>Connect 4 AI</title>
</head>
<body>
    <h1>Connect 4 AI Engine</h1>
    <p>Check the Browser Console (F12) to see the AI load and calculate.</p>

    <script>
        let model = { weights: null };
    
        async function loadModel() {
            try {
                const response = await fetch('2000.json');
                const data = await response.json();
                model.weights = data; 
                console.log("Model structure loaded:", Object.keys(data));
            } catch (e) {
                console.error("Failed to load 2000.json", e);
            }
        }
    
        function forwardPass(input) {
            const weights = model.weights;
            
            // Helper to perform: activation(dot(input, W) + b)
            function layer(inputData, W, b, isLast) {
                let output = new Float32Array(W.length);
                for (let i = 0; i < W.length; i++) {
                    let sum = b[i];
                    for (let j = 0; j < inputData.length; j++) {
                        sum += inputData[j] * W[i][j];
                    }
                    // Use Tanh for hidden layers, maybe Identity or Softmax for last
                    output[i] = isLast ? sum : Math.tanh(sum); 
                }
                return output;
            }
        
            // Pass through 3 layers
            let layer1 = layer(input, weights['network.0.weight'], weights['network.0.bias'], false);
            let layer2 = layer(layer1, weights['network.2.weight'], weights['network.2.bias'], false);
            let finalOutput = layer(layer2, weights['network.4.weight'], weights['network.4.bias'], true);
            
            return finalOutput;
        }
    
        async function runAI(boardState) {
            // Wait until loadModel finishes before proceeding
            if (!model.weights) await loadModel();
            
            const result = forwardPass(new Float32Array(boardState));
            if (result) {
                return result.indexOf(Math.max(...result));
            }
        }
    
        window.onload = async () => {
            await loadModel();
            const testBoard = new Array(42).fill(0);
            const move = await runAI(testBoard);
            console.log("AI Move:", move);
        };
    </script>
</body>
</html>
